name: Scrape VA/NC Shows

on:
  schedule:
    # Run daily at 6:00 AM UTC (2:00 AM ET)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium dependencies
        run: npx puppeteer browsers install chrome

      - name: Run scraper
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
        run: npm run scrape

      - name: Commit and push shows.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shows.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: update shows.json [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
